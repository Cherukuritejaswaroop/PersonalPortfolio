<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="920" rx="40" fill="#EEF5FB"/>
  <text x="750" y="92" fill="#17314A" font-family="Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">HOW A NEURAL NETWORK PROCESSES INFORMATION</text>
  <text x="750" y="128" fill="#5B7488" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Input features move through hidden layers, weighted connections, and final output</text>
  <g stroke="#93B6C7" stroke-width="3" opacity="0.8">
    <path d="M300 260L620 214"/><path d="M300 260L620 360"/><path d="M300 420L620 214"/><path d="M300 420L620 360"/><path d="M300 420L620 506"/><path d="M300 580L620 360"/><path d="M300 580L620 506"/>
    <path d="M780 214L1100 176"/><path d="M780 214L1100 322"/><path d="M780 360L1100 176"/><path d="M780 360L1100 322"/><path d="M780 360L1100 468"/><path d="M780 506L1100 322"/><path d="M780 506L1100 468"/><path d="M780 506L1100 614"/>
  </g>
  <g fill="#1F4868" stroke="#7BB7A7" stroke-width="4">
    <circle cx="250" cy="260" r="48"/><circle cx="250" cy="420" r="48"/><circle cx="250" cy="580" r="48"/>
    <circle cx="700" cy="214" r="48"/><circle cx="700" cy="360" r="48"/><circle cx="700" cy="506" r="48"/>
    <circle cx="1150" cy="176" r="48"/><circle cx="1150" cy="322" r="48"/><circle cx="1150" cy="468" r="48"/><circle cx="1150" cy="614" r="48"/>
  </g>
  <g fill="#F7FBFF" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <text x="250" y="268">X1</text><text x="250" y="428">X2</text><text x="250" y="588">X3</text>
    <text x="700" y="222">H1</text><text x="700" y="368">H2</text><text x="700" y="514">H3</text>
    <text x="1150" y="184">Y1</text><text x="1150" y="330">Y2</text><text x="1150" y="476">Y3</text><text x="1150" y="622">Y4</text>
  </g>
  <g fill="#244C6D" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
