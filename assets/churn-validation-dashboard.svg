<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="920" rx="40" fill="#EEF5FB"/>
  <text x="750" y="88" fill="#17314A" font-family="Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">MODEL VALIDATION &amp; VERIFICATION FOR CUSTOMER CHURN</text>
  <text x="750" y="124" fill="#5B7488" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Validation split, confusion-matrix review, and monitoring for reliable decisions</text>
  <g fill="#FDFEFF" stroke="#C7D8E5" stroke-width="3">
    <rect x="84" y="172" width="386" height="190" rx="30"/>
    <rect x="556" y="172" width="386" height="190" rx="30"/>
    <rect x="1028" y="172" width="386" height="190" rx="30"/>
    <rect x="84" y="420" width="610" height="388" rx="30"/>
    <rect x="750" y="420" width="664" height="388" rx="30"/>
  </g>
  <g fill="#1F4868" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="277" y="222" font-size="22" font-weight="700">DATA SPLIT</text>
    <text x="749" y="222" font-size="22" font-weight="700">MODEL CHOICE</text>
    <text x="1221" y="222" font-size="22" font-weight="700">VALIDATION PRIORITY</text>
  </g>
  <g fill="#D0A454" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="277" y="296" font-size="54" font-weight="700">70 / 15 / 15</text>
    <text x="749" y="296" font-size="50" font-weight="700">RANDOM</text>
    <text x="749" y="342" font-size="50" font-weight="700">FOREST</text>
    <text x="1221" y="296" font-size="56" font-weight="700">RECALL</text>
  </g>
  <g fill="#586F83" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    <text x="277" y="330">Train, validation, and test sets</text>
    <text x="277" y="356">separate tuning from final evaluation.</text>
    <text x="749" y="330">Handles non-linear churn behavior</text>
    <text x="749" y="356">while resisting overfitting.</text>
    <text x="1221" y="330">Reduce missed churners so retention</text>
    <text x="1221" y="356">teams can act earlier.</text>
  </g>
  <g>
    <text x="126" y="470" fill="#1F4868" font-family="Arial, sans-serif" font-size="24" font-weight="700">VALIDATION WORKFLOW</text>
    <g fill="#234B69" stroke="#7BB7A7" stroke-width="4">
      <rect x="126" y="522" width="128" height="88" rx="24"/>
      <rect x="286" y="522" width="128" height="88" rx="24"/>
      <rect x="446" y="522" width="128" height="88" rx="24"/>
      <rect x="126" y="650" width="448" height="104" rx="28"/>
    </g>
    <g fill="#F7FBFF" font-family="Arial, sans-serif" text-anchor="middle">
      <text x="190" y="574" font-size="20" font-weight="700">CLEAN</text>
      <text x="350" y="574" font-size="20" font-weight="700">BALANCE</text>
      <text x="510" y="574" font-size="20" font-weight="700">TRAIN</text>
      <text x="350" y="704" font-size="20" font-weight="700">Median imputation, outlier control, and SMOTE</text>
    </g>
    <g stroke="#86B6C9" stroke-width="10" stroke-linecap="round">
      <path d="M254 566H286"/><path d="M414 566H446"/>
    </g>
  </g>
  <g>
    <text x="792" y="470" fill="#1F4868" font-family="Arial, sans-serif" font-size="24" font-weight="700">CONFUSION MATRIX FOCUS</text>
    <g fill="#234B69" stroke="#7BB7A7" stroke-width="4">
      <rect x="792" y="520" width="240" height="118" rx="26"/>
      <rect x="1060" y="520" width="240" height="118" rx="26"/>
      <rect x="792" y="664" width="240" height="118" rx="26"/>
      <rect x="1060" y="664" width="240" height="118" rx="26"/>
    </g>
    <g fill="#F7FBFF" font-family="Arial, sans-serif" text-anchor="middle">
      <text x="912" y="560" font-size="18" font-weight="700">TRUE NEGATIVE</text>
      <text x="912" y="608" font-size="42" font-weight="700">850</text>
      <text x="1180" y="560" font-size="18" font-weight="700">FALSE POSITIVE</text>
      <text x="1180" y="608" font-size="42" font-weight="700">50</text>
      <text x="912" y="704" font-size="18" font-weight="700">FALSE NEGATIVE</text>
      <text x="912" y="752" font-size="42" font-weight="700">30</text>
      <text x="1180" y="704" font-size="18" font-weight="700">TRUE POSITIVE</text>
      <text x="1180" y="752" font-size="42" font-weight="700">70</text>
    </g>
  </g>
</svg>
