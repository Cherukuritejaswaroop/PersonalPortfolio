<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="920" rx="40" fill="#EEF5FB"/>
  <text x="750" y="88" fill="#17314A" font-family="Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">MACHINE LEARNING VS DEEP LEARNING</text>
  <text x="750" y="124" fill="#5B7488" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Comparing data needs, interpretability, scale, and ideal use cases</text>
  <rect x="76" y="170" width="610" height="650" rx="34" fill="#F9FCFF" stroke="#C6D8E5" stroke-width="3"/>
  <rect x="814" y="170" width="610" height="650" rx="34" fill="#F9FCFF" stroke="#C6D8E5" stroke-width="3"/>
  <rect x="126" y="210" width="510" height="86" rx="24" fill="#1E4767"/>
  <rect x="864" y="210" width="510" height="86" rx="24" fill="#21506E"/>
  <text x="381" y="265" fill="#F7FBFF" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">MACHINE LEARNING</text>
  <text x="1119" y="265" fill="#F7FBFF" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">DEEP LEARNING</text>
  <g fill="#234B69" stroke="#7CB7A8" stroke-width="4">
    <rect x="126" y="336" width="226" height="158" rx="28"/>
    <rect x="410" y="336" width="226" height="158" rx="28"/>
    <rect x="126" y="534" width="226" height="218" rx="28"/>
    <rect x="410" y="534" width="226" height="218" rx="28"/>
    <rect x="864" y="336" width="226" height="158" rx="28"/>
    <rect x="1148" y="336" width="226" height="158" rx="28"/>
    <rect x="864" y="534" width="226" height="218" rx="28"/>
    <rect x="1148" y="534" width="226" height="218" rx="28"/>
  </g>
  <g fill="#F7FBFF" font-family="Arial, sans-serif">
    <text x="239" y="388" font-size="22" font-weight="700" text-anchor="middle">BEST WITH</text>
    <text x="239" y="424" font-size="18" text-anchor="middle">Structured tables,</text>
    <text x="239" y="450" font-size="18" text-anchor="middle">clear features, smaller data</text>
    <text x="523" y="388" font-size="22" font-weight="700" text-anchor="middle">STRENGTHS</text>
    <text x="523" y="424" font-size="18" text-anchor="middle">Faster training, easier</text>
    <text x="523" y="450" font-size="18" text-anchor="middle">to explain and deploy</text>
    <text x="239" y="586" font-size="22" font-weight="700" text-anchor="middle">COMMON USES</text>
    <text x="239" y="622" font-size="18" text-anchor="middle">Sales forecasting</text>
    <text x="239" y="648" font-size="18" text-anchor="middle">Churn prediction</text>
    <text x="239" y="674" font-size="18" text-anchor="middle">Fraud detection</text>
    <text x="523" y="586" font-size="22" font-weight="700" text-anchor="middle">TRADE-OFFS</text>
    <text x="523" y="622" font-size="18" text-anchor="middle">Needs engineered features</text>
    <text x="523" y="648" font-size="18" text-anchor="middle">Can plateau on complex inputs</text>

    <text x="977" y="388" font-size="22" font-weight="700" text-anchor="middle">BEST WITH</text>
    <text x="977" y="424" font-size="18" text-anchor="middle">Images, audio, text,</text>
    <text x="977" y="450" font-size="18" text-anchor="middle">and very large datasets</text>
    <text x="1261" y="388" font-size="22" font-weight="700" text-anchor="middle">STRENGTHS</text>
    <text x="1261" y="424" font-size="18" text-anchor="middle">Learns patterns directly</text>
    <text x="1261" y="450" font-size="18" text-anchor="middle">from raw complex data</text>
    <text x="977" y="586" font-size="22" font-weight="700" text-anchor="middle">COMMON USES</text>
    <text x="977" y="622" font-size="18" text-anchor="middle">Image classification</text>
    <text x="977" y="648" font-size="18" text-anchor="middle">Speech recognition</text>
    <text x="977" y="674" font-size="18" text-anchor="middle">Natural language tasks</text>
    <text x="1261" y="586" font-size="22" font-weight="700" text-anchor="middle">TRADE-OFFS</text>
    <text x="1261" y="622" font-size="18" text-anchor="middle">Higher compute cost</text>
    <text x="1261" y="648" font-size="18" text-anchor="middle">Lower interpretability</text>
  </g>
  <g stroke="#86B6C9" stroke-width="10" stroke-linecap="round">
    <path d="M688 494H808"/>
  </g>
  <polygon points="808,494 784,478 784,510" fill="#86B6C9"/>
  <text x="748" y="474" fill="#35526A" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">COMPLEXITY INCREASES</text>
</svg>
